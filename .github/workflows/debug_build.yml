name: Build

on:
  push:
    branches:
      - master
      - 'github-releases/**'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Build APKs
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          echo "Setting vars"

          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
              GITHUB_SHA="${{ github.event.pull_request.head.sha }}" # Do not use last merge commit set in GITHUB_SHA
          fi

          # Set RELEASE_VERSION_NAME to "<CURRENT_VERSION_NAME>+<last_commit_hash>"
          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}" # The "+" is necessary so that versioning precedence is not affected
          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
           exit_on_error "The versionName '${RELEASE_VERSION_NAME/v/}' is not a valid version as per semantic version '2.0.0' spec in the format 'major.minor.patch(-prerelease)(+buildmetadata)'. https://semver.org/spec/v2.0.0.html."
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-${{ env.PACKAGE_VARIANT }}-github-debug" # Note the "-", GITHUB_SHA will already have "+" before it
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          # Used by attachment steps later
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV
          echo "RELEASE_VERSION_NAME=$RELEASE_VERSION_NAME" >> $GITHUB_ENV

          echo "Building APKs for 'APK_VERSION_TAG' build"
          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}" # Used by app/build.gradle
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG" # Used by app/build.gradle
          export TERMUX_PACKAGE_VARIANT="${{ env.PACKAGE_VARIANT }}" # Used by app/build.gradle
          if ! ./gradlew assembleDebug; then
            exit_on_error "Build failed for '$APK_VERSION_TAG' build."
          fi

          echo "Validating APKs"
          for abi in universal arm64-v8a armeabi-v7a x86_64 x86; do
            if ! test -f "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk"; then
              files_found="$(ls "$APK_DIR_PATH")"
              exit_on_error "Failed to find built APK at '$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk'. Files found: "$'\n'"$files_found"
            fi
          done

          echo "Generating sha25sums file"
          if ! (cd "$APK_DIR_PATH"; sha256sum \
            "${APK_BASENAME_PREFIX}_universal.apk" \
            "${APK_BASENAME_PREFIX}_arm64-v8a.apk" \
            "${APK_BASENAME_PREFIX}_armeabi-v7a.apk" \
            "${APK_BASENAME_PREFIX}_x86_64.apk" \
            "${APK_BASENAME_PREFIX}_x86.apk" \
            > "${APK_BASENAME_PREFIX}_sha256sums"); then
            exit_on_error "Generate sha25sums failed for '$APK_VERSION_TAG' release."
          fi

      - name: Attach universal APK file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_universal
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_universal.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: Attach arm64-v8a APK file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_arm64-v8a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: Attach armeabi-v7a APK file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: Attach x86_64 APK file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86_64
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86_64.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: Attach x86 APK file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: Attach sha256sums file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_sha256sums
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_sha256sums
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: Create and upload to GitHub Release
        if: github.event_name == 'push'
        shell: bash {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Generating Release Notes"
          cat <<'EOF' > release_notes.md
          ${{ env.RELEASE_VERSION_NAME }} - $(date -u +'%Y-%m-%d %H:%M UTC')

          Commit history: https://github.com/${{ github.repository }}/commits/${{ env.RELEASE_VERSION_NAME }}

          ### Downloads

          #### Android 7+ only
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_universal.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_universal.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_arm64-v8a.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_arm64-v8a.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_armeabi-v7a.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_armeabi-v7a.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_x86_64.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_x86_64.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_x86.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_x86.apk)

          #### Android 5 and 6 only
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_universal.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_universal.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_arm64-v8a.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_arm64-v8a.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_armeabi-v7a.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_armeabi-v7a.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_x86_64.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_x86_64.apk)
          * [termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_x86.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_VERSION_NAME }}/termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-5-github-debug_x86.apk)

          **NOTICE:** Use `apt-android-7` variant for Android `>= 7` and `apt-android-5` variant for Android `5 / 6` and do not mix. Use `universal` variant if device/Android architecture is unknown. Basically, use `termux-app_${{ env.RELEASE_VERSION_NAME }}-apt-android-7-github-debug_universal.apk` variant for Android `>= 7` if in doubt. Check install and GitHub install source docs for more info.
          EOF

          # Trim leading spaces from release_notes.md so formatting isn't broken inside cat EOF block
          sed -i -E 's/^[[:space:]]{10}//' release_notes.md

          echo "Creating Release if not exists"
          gh release create "${{ env.RELEASE_VERSION_NAME }}" --prerelease --title "Debug Build ${{ env.RELEASE_VERSION_NAME }}" -F release_notes.md || {
            echo "Release creation failed or already exists. Checking if it exists..."
            gh release view "${{ env.RELEASE_VERSION_NAME }}"
          }

          echo "Uploading APKs to GitHub Release"
          gh release upload "${{ env.RELEASE_VERSION_NAME }}" \
            "${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_universal.apk" \
            "${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.apk" \
            "${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a.apk" \
            "${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86_64.apk" \
            "${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86.apk" \
            "${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_sha256sums" \
            --clobber
